<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Tracker (Local)</title>
    <script src="https://unpkg.com/dexie@4.0.4/dist/dexie.js"></script>
    <style>
        :root { --primary: #2196F3; --danger: #f44336; --success: #4CAF50; --bg: #eeeeee; --text: #212121; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center;
            height: 100vh;
            overflow: hidden; 
        }

        .container { 
            background: white; 
            width: 100%; 
            max-width: 500px; 
            display: flex;
            flex-direction: column; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        }

        .header-box {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid var(--primary);
            padding: 15px 20px;
            background: white;
            z-index: 10;
        }
        
        h2 { margin: 0; color: var(--text); font-size: 1.1rem; }

        /* Mode Selector Tabs */
        .tab-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #e0e0e0;
            border-bottom: 1px solid #ccc;
        }
        .tab-btn {
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            background: #e0e0e0;
            border: none;
            color: #666;
            transition: background 0.2s, color 0.2s;
        }
        .tab-btn.active-tab {
            background: white;
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        #records-container {
            flex: 1; 
            overflow-y: auto; 
            padding: 0 10px;
        }

        .view { display: none; height: 100%; flex-direction: column; }
        .active { display: flex; animation: fadeIn 0.2s; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-small { padding: 8px 10px; font-size: 0.7rem; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-add-small { background: var(--primary); color: white; }
        .btn-save-small { background: var(--success); color: white; }
        .btn-delete-small { background: var(--danger); color: white; }
        .btn-cancel-small { background: #757575; color: white; }
        .btn-import { background: #9c27b0; color: white; }
        .btn-csv { background: #009688; color: white; }

        .record-item { 
            display: grid;
            grid-template-columns: 1fr;
            padding: 18px; 
            border-bottom: 1px solid #ddd; 
            cursor: pointer; 
            font-size: 1.1rem;
            align-items: center;
        }

        .record-item .sub-info {
            font-size: 0.8rem;
            color: #757575;
            margin-top: 4px;
        }

        .input-area { padding: 20px; overflow-y: auto; padding-bottom: 80px; }
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .label-hint { font-size: 0.8rem; color: #666; margin-bottom: -5px; display: block; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-list" class="view active">
        <div class="tab-box">
            <button id="tab-tv" class="tab-btn active-tab" onclick="switchMode('tv')">TV Shows</button>
            <button id="tab-movies" class="tab-btn" onclick="switchMode('movies')">Movies</button>
        </div>

        <div class="header-box">
            <h2 id="list-title">TV Shows</h2>
            <button id="btn-main-import" class="btn-small btn-import" onclick="triggerImport()">Import</button>
            <button class="btn-small btn-cancel-small" onclick="exportData()">Backup</button>
            <button class="btn-small btn-add-small" onclick="openAddView()">+ Add</button>
            
            <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this)">
            <input type="file" id="importCSVFile" style="display:none" accept=".csv" onchange="importCSVData(this)">
        </div>
        <div id="records-container"></div>
    </div>

    <div id="view-input" class="view">
        <div class="header-box">
            <h2 id="input-title">New Show</h2>
            <button class="btn-small btn-cancel-small" onclick="showView('view-list')">Cancel</button>
            <button class="btn-small btn-save-small" onclick="addEntry()">Save</button>
        </div>
        <div class="input-area">
            <label id="lbl-in-title" class="label-hint">Series Title</label>
            <input type="text" id="in-series">
            
            <label class="label-hint">Streamer</label>
            <select id="in-streamer" onchange="handleNewStreamer(this)">
                <option value="">Select Streamer...</option>
                <option value="Netflix">Netflix</option>
                <option value="Prime">Prime</option>
                <option value="Peacock">Peacock</option>
                <option value="Paramount+">Paramount+</option>
                <option value="Hulu">Hulu</option>
                <option value="Disney+">Disney+</option>
                <option value="Apple">Apple</option>
                <option value="Max">Max</option>
                <option value="ADD_NEW" style="font-weight: bold; color: var(--primary);">+ Add New Streamer</option>
            </select>

            <label class="label-hint">Location</label>
            <input type="text" id="in-location" placeholder="e.g. Hammond">

            <div id="in-movie-fields" style="display:none">
                <label class="label-hint">Seen Status</label>
                <input type="text" id="in-seen" placeholder="e.g. Yes, No, 2/11/24">
                
                <label class="label-hint">Genre</label>
                <input type="text" id="in-genre">

                <label class="label-hint">Date Added</label>
                <input type="text" id="in-dateadded">
            </div>

            <div id="in-tv-fields" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label class="label-hint">Seasons</label>
                    <input type="number" id="in-seasons" inputmode="numeric">
                </div>
                <div>
                    <label class="label-hint">Episodes</label>
                    <input type="number" id="in-episodes" inputmode="numeric">
                </div>
            </div>

            <label class="label-hint">Comments</label>
            <textarea id="in-comments" rows="3"></textarea>
        </div>
    </div>

    <div id="view-edit" class="view">
        <div class="header-box">
            <h2 id="edit-title">Edit Show</h2>
            <button class="btn-small btn-delete-small" onclick="deleteEntry()">Delete</button>
            <button class="btn-small btn-save-small" onclick="updateEntry()">Update</button>
        </div>
        <div class="input-area">
            <input type="hidden" id="edit-id">
            
            <label id="lbl-edit-title" class="label-hint">Series Title</label>
            <input type="text" id="edit-series">
            
            <label class="label-hint">Streamer</label>
            <select id="edit-streamer" onchange="handleNewStreamer(this)">
                <option value="">Select Streamer...</option>
                <option value="Netflix">Netflix</option>
                <option value="Prime">Prime</option>
                <option value="Peacock">Peacock</option>
                <option value="Paramount+">Paramount+</option>
                <option value="Hulu">Hulu</option>
                <option value="Disney+">Disney+</option>
                <option value="Apple">Apple</option>
                <option value="Max">Max</option>
                <option value="ADD_NEW" style="font-weight: bold; color: var(--primary);">+ Add New Streamer</option>
            </select>

            <label class="label-hint">Location</label>
            <input type="text" id="edit-location">

            <div id="edit-movie-fields" style="display:none">
                <label class="label-hint">Seen Status</label>
                <input type="text" id="edit-seen">
                
                <label class="label-hint">Genre</label>
                <input type="text" id="edit-genre">

                <label class="label-hint">Date Added</label>
                <input type="text" id="edit-dateadded">
            </div>

            <div id="edit-tv-fields" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label class="label-hint">Seasons</label>
                    <input type="number" id="edit-seasons" inputmode="numeric">
                </div>
                <div>
                    <label class="label-hint">Episodes</label>
                    <input type="number" id="edit-episodes" inputmode="numeric">
                </div>
            </div>

            <label class="label-hint">Comments</label>
            <textarea id="edit-comments" rows="3"></textarea>

            <button class="btn-small btn-cancel-small" style="width:100%; margin-top:20px; padding:15px" onclick="showView('view-list')">Back to List</button>
        </div>
    </div>
</div>

<script>
    // 1. DEXIE DATABASE SETUP WITH VERSION BUMP TO FORCE UPGRADE
    const db = new Dexie("TVTrackerDB");
    
    // Explicit schema declarations across versions to satisfy IndexedDB constraints safely
    db.version(1).stores({
        tvshows: '++id, series, streamer, location' 
    });

    db.version(3).stores({
        tvshows: '++id, series, streamer, location',
        movies: '++id, title, streamer, seen, genre'
    });

    let currentData = [];
    let currentMode = 'tv'; // 'tv' or 'movies'

    // 2. INTERFACE NAVIGATION CONTROL
    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
        
        const importBtn = document.getElementById('btn-main-import');
        
        if(mode === 'tv') {
            document.getElementById('tab-tv').classList.add('active-tab');
            document.getElementById('list-title').innerText = "TV Shows";
            importBtn.innerText = "Import";
            importBtn.className = "btn-small btn-import";
        } else {
            document.getElementById('tab-movies').classList.add('active-tab');
            document.getElementById('list-title').innerText = "Movies";
            importBtn.innerText = "CSV Import";
            importBtn.className = "btn-small btn-csv";
        }
        fetchData();
    }

    function triggerImport() {
        if (currentMode === 'tv') {
            document.getElementById('importFile').click();
        } else {
            document.getElementById('importCSVFile').click();
        }
    }

    function openAddView() {
        clearInputs();
        if (currentMode === 'tv') {
            document.getElementById('input-title').innerText = "New Show";
            document.getElementById('lbl-in-title').innerText = "Series Title";
            document.getElementById('in-tv-fields').style.display = 'grid';
            document.getElementById('in-movie-fields').style.display = 'none';
        } else {
            document.getElementById('input-title').innerText = "New Movie";
            document.getElementById('lbl-in-title').innerText = "Movie Title";
            document.getElementById('in-tv-fields').style.display = 'none';
            document.getElementById('in-movie-fields').style.display = 'block';
        }
        showView('view-input');
    }

    function openEditView(item) {
        document.getElementById('edit-id').value = item.id;
        document.getElementById('edit-location').value = item.location || '';
        document.getElementById('edit-comments').value = item.comments || '';

        if (currentMode === 'tv') {
            document.getElementById('edit-title').innerText = "Edit Show";
            document.getElementById('lbl-edit-title').innerText = "Series Title";
            document.getElementById('edit-tv-fields').style.display = 'grid';
            document.getElementById('edit-movie-fields').style.display = 'none';
            
            document.getElementById('edit-series').value = item.series || '';
            ensureStreamerExists('edit-streamer', item.streamer);
            document.getElementById('edit-seasons').value = item.seasons || '';
            document.getElementById('edit-episodes').value = item.episodes || '';
        } else {
            document.getElementById('edit-title').innerText = "Edit Movie";
            document.getElementById('lbl-edit-title').innerText = "Movie Title";
            document.getElementById('edit-tv-fields').style.display = 'none';
            document.getElementById('edit-movie-fields').style.display = 'block';
            
            document.getElementById('edit-series').value = item.title || '';
            ensureStreamerExists('edit-streamer', item.streamer);
            document.getElementById('edit-seen').value = item.seen || '';
            document.getElementById('edit-genre').value = item.genre || '';
            document.getElementById('edit-dateadded').value = item.dateAdded || '';
        }
        showView('view-edit');
    }

    // 3. DATA ENGINE RETRIEVAL & RENDERING
    async function fetchData() {
        if (navigator.storage && navigator.storage.persist) {
            await navigator.storage.persist();
        }

        try {
            // Open DB cleanly and safely recover from layout shifts if schema blocked it previously
            await db.open().catch(async (err) => {
                console.warn("DB Open locked, clearing layout blocking structures:", err);
                // Fail-safe correction structure if local device versions conflict aggressively
                if(err.name === 'VersionError') {
                    db.close();
                    await Dexie.delete("TVTrackerDB");
                    await db.open();
                }
            });

            if (currentMode === 'tv') {
                currentData = await db.tvshows.orderBy('series').toArray();
            } else {
                currentData = await db.movies.orderBy('title').toArray();
            }
            renderList();
        } catch (err) {
            console.error("Dexie Core Initialization Error:", err);
        }
    }

    function renderList() {
        const container = document.getElementById('records-container');
        if (!currentData.length) {
            const hintText = currentMode === 'tv' ? 'Use "Import" to load a JSON backup.' : 'Use "CSV Import" to load your movie spreadsheet.';
            container.innerHTML = `<p style="text-align:center; padding: 40px; color: #999;">No entries found.<br>${hintText}</p>`;
            return;
        }

        container.innerHTML = '';
        currentData.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'record-item';
            
            if (currentMode === 'tv') {
                div.innerHTML = `
                    <span>${item.series || 'Untitled'}</span>
                    <span class="sub-info">${item.streamer || 'No Streamer'}${item.location ? ' • ' + item.location : ''}</span>
                `;
            } else {
                const seenLabel = item.seen ? ` [Seen: ${item.seen}]` : '';
                div.innerHTML = `
                    <span>${item.title || 'Untitled'}</span>
                    <span class="sub-info">${item.streamer || 'No Streamer'}${seenLabel}${item.genre ? ' • ' + item.genre : ''}</span>
                `;
            }
            
            div.onclick = () => openEditView(item);
            container.appendChild(div);
        });
    }

    // 4. WRITE, UPDATE, & REMOVE ACTIONS
    async function addEntry() {
        const titleValue = document.getElementById('in-series').value.trim();
        if (!titleValue) return alert("Title required");

        if (currentMode === 'tv') {
            const payload = {
                series: titleValue,
                streamer: document.getElementById('in-streamer').value,
                location: document.getElementById('in-location').value.trim(),
                seasons: parseInt(document.getElementById('in-seasons').value) || 0,
                episodes: parseInt(document.getElementById('in-episodes').value) || 0,
                comments: document.getElementById('in-comments').value.trim()
            };
            await db.tvshows.add(payload);
        } else {
            const payload = {
                title: titleValue,
                streamer: document.getElementById('in-streamer').value,
                location: document.getElementById('in-location').value.trim(),
                seen: document.getElementById('in-seen').value.trim(),
                genre: document.getElementById('in-genre').value.trim(),
                dateAdded: document.getElementById('in-dateadded').value.trim(),
                comments: document.getElementById('in-comments').value.trim()
            };
            await db.movies.add(payload);
        }

        clearInputs();
        await fetchData();
        showView('view-list');
    }

    async function updateEntry() {
        const id = parseInt(document.getElementById('edit-id').value);
        const titleValue = document.getElementById('edit-series').value.trim();
        if (!titleValue) return alert("Title required");

        if (currentMode === 'tv') {
            const payload = {
                series: titleValue,
                streamer: document.getElementById('edit-streamer').value,
                location: document.getElementById('edit-location').value.trim(),
                seasons: parseInt(document.getElementById('edit-seasons').value) || 0,
                episodes: parseInt(document.getElementById('edit-episodes').value) || 0,
                comments: document.getElementById('edit-comments').value.trim()
            };
            await db.tvshows.update(id, payload);
        } else {
            const payload = {
                title: titleValue,
                streamer: document.getElementById('edit-streamer').value,
                location: document.getElementById('edit-location').value.trim(),
                seen: document.getElementById('edit-seen').value.trim(),
                genre: document.getElementById('edit-genre').value.trim(),
                dateAdded: document.getElementById('edit-dateadded').value.trim(),
                comments: document.getElementById('edit-comments').value.trim()
            };
            await db.movies.update(id, payload);
        }

        await fetchData();
        showView('view-list');
    }

    async function deleteEntry() {
        const id = parseInt(document.getElementById('edit-id').value);
        if(confirm("Delete this entry?")) {
            if (currentMode === 'tv') {
                await db.tvshows.delete(id);
            } else {
                await db.movies.delete(id);
            }
            await fetchData();
            showView('view-list');
        }
    }

    // 5. PARSERS & INTERFACE UTILITIES
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    function handleNewStreamer(selectElement) {
        if (selectElement.value === "ADD_NEW") {
            const newName = prompt("New streamer name:");
            if (newName && newName.trim()) {
                const clean = newName.trim();
                ['in-streamer', 'edit-streamer'].forEach(id => {
                    const el = document.getElementById(id);
                    const opt = new Option(clean, clean);
                    el.insertBefore(opt, el.lastElementChild);
                });
                selectElement.value = clean;
            } else {
                selectElement.value = "";
            }
        }
    }

    function ensureStreamerExists(selectId, value) {
        const select = document.getElementById(selectId);
        if (!value) { select.value = ""; return; }
        let exists = Array.from(select.options).some(opt => opt.value === value);
        if (!exists) {
            select.insertBefore(new Option(value, value), select.lastElementChild);
        }
        select.value = value;
    }

    function clearInputs() {
        ['in-series', 'in-streamer', 'in-seasons', 'in-episodes', 'in-comments', 'in-location', 'in-seen', 'in-genre', 'in-dateadded'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.value = '';
        });
    }

    function cleanStreamerName(str) {
        if (!str) return '';
        let s = str.trim().toLowerCase();
        if (s === 'you tube' || s === 'youtube') return 'YouTube';
        if (s === 'freevue' || s === 'free ue' || s === 'freevue seen') return 'Freevue';
        if (s === 'amazon prime' || s === 'prime') return 'Prime';
        if (s === 'hbo max') return 'Max';
        return str.trim();
    }

    function parseCSVLine(text) {
        let p = '', r = [];
        let q = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') { q = !q; }
            else if (c === ',' && !q) { r.push(p.trim()); p = ''; }
            else { p += c; }
        }
        r.push(p.trim());
        return r;
    }

    // 6. BACKUP & MERGE LOGIC
    async function exportData() {
        const shows = await db.tvshows.toArray();
        const movies = await db.movies.toArray();
        const exportPayload = { tvshows: shows, movies: movies };

        const blob = new Blob([JSON.stringify(exportPayload, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `media_tracker_master_backup.json`;
        a.click();
    }

    async function importData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        
        reader.onload = async (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                let importedShows = Array.isArray(imported) ? imported : (imported.tvshows || []);
                let importedMovies = imported.movies || [];

                let addedShows = 0, skippedShows = 0;
                let addedMovies = 0, skippedMovies = 0;

                await db.transaction('rw', [db.tvshows, db.movies], async () => {
                    for (const show of importedShows) {
                        const exists = await db.tvshows.where('series').equals(show.series || '').first();
                        if (!exists && show.series) {
                            const { id, ...cleanShow } = show;
                            await db.tvshows.add(cleanShow);
                            addedShows++;
                        } else {
                            skippedShows++;
                        }
                    }
                    for (const movie of importedMovies) {
                        const exists = await db.movies.where('title').equals(movie.title || '').first();
                        if (!exists && movie.title) {
                            const { id, ...cleanMovie } = movie;
                            await db.movies.add(cleanMovie);
                            addedMovies++;
                        } else {
                            skippedMovies++;
                        }
                    }
                });

                alert(`Backup Sync Complete!\nShows Added: ${addedShows} (Skipped ${skippedShows})\nMovies Added: ${addedMovies} (Skipped ${skippedMovies})`);
                fetchData();
            } catch (err) {
                alert("Import failed: Structural file format mismatch.");
            }
        };
        reader.readAsText(file);
        input.value = '';
    }

    async function importCSVData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();

        reader.onload = async (e) => {
            try {
                const lines = e.target.result.split(/\r?\n/);
                if (lines.length < 2) return alert("Empty CSV File Data.");

                const headers = parseCSVLine(lines[0]);
                const idxTitle = headers.findIndex(h => h.toLowerCase().includes('title'));
                const idxSeen = headers.findIndex(h => h.toLowerCase() === 'seen');
                const idxStreamer = headers.findIndex(h => h.toLowerCase().includes('stream'));
                const idxDate = headers.findIndex(h => h.toLowerCase().includes('date'));
                const idxGenre = headers.findIndex(h => h.toLowerCase() === 'genre');
                const idxComments = headers.findIndex(h => h.toLowerCase() === 'comments');

                let addedCount = 0;
                let skippedCount = 0;

                await db.transaction('rw', db.movies, async () => {
                    for (let i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        
                        const columns = parseCSVLine(lines[i]);
                        const title = columns[idxTitle];

                        if (!title || title.toLowerCase() === 'test') {
                            skippedCount++;
                            continue;
                        }

                        const exists = await db.movies.where('title').equals(title).first();

                        if (!exists) {
                            const rawStreamer = idxStreamer !== -1 ? columns[idxStreamer] : '';
                            const cleanStream = cleanStreamerName(rawStreamer);

                            if (cleanStream) {
                                ['in-streamer', 'edit-streamer'].forEach(id => {
                                    ensureStreamerExists(id, cleanStream);
                                });
                            }

                            await db.movies.add({
                                title: title,
                                streamer: cleanStream,
                                seen: idxSeen !== -1 ? columns[idxSeen] : '',
                                dateAdded: idxDate !== -1 ? columns[idxDate] : '',
                                genre: idxGenre !== -1 ? columns[idxGenre] : '',
                                location: (idxComments !== -1 && columns[idxComments].toLowerCase() === 'hammond') ? 'Hammond' : '',
                                comments: idxComments !== -1 ? columns[idxComments] : ''
                            });
                            addedCount++;
                        } else {
                            skippedCount++;
                        }
                    }
                });

                alert(`CSV Processing Complete!\nImported: ${addedCount} Movies\nSkipped: ${skippedCount} items/duplicates`);
                fetchData();
            } catch (err) {
                console.error(err);
                alert("Failed parsing CSV file format.");
            }
        };
        reader.readAsText(file);
        input.value = '';
    }

    // START
    fetchData();
</script>
</body>
</html>
